name: Publish package to npm

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    if: github.actor != 'github-actions'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm >= 9.5.0
        run: |
          npm --version || true
          npm install -g npm@9.6.7

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Publish to npm with provenance (unpublish if version exists)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          spec="$pkg@$ver"
          echo "Checking if $spec exists on npm..."
          if npm view "$spec" >/dev/null 2>&1; then
            echo "$spec exists — attempting to unpublish"
            npm unpublish "$spec" --force || {
              echo "npm unpublish failed; exiting"
              exit 1
            }
            echo "Unpublished $spec"
          else
            echo "$spec does not exist on npm"
          fi

          echo "Publishing $spec with provenance"
          npm publish --provenance --access public

      - name: Bump version and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npm version patch -m "chore(release): %s"
          git push origin HEAD:main --follow-tags
